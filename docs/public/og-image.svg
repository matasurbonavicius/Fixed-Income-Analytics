<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Fixed Income Analytics social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2e26"/>
      <stop offset="1" stop-color="#1d4d40"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="#3c8772"/>
    <g fill="#ffffff">
      <rect x="24" y="72" width="12" height="24" rx="3"/>
      <rect x="44" y="60" width="12" height="36" rx="3"/>
      <rect x="64" y="48" width="12" height="48" rx="3"/>
      <rect x="84" y="32" width="12" height="64" rx="3"/>
    </g>
    <path d="M22 84 C 46 56, 74 36, 98 24" fill="none" stroke="#d6f0e6" stroke-width="6" stroke-linecap="round"/>
    <circle cx="98" cy="24" r="6.5" fill="#d6f0e6"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="260" y="232" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff">Fixed Income Analytics</text>
  <text x="260" y="292" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#9fd3c2">Fixed-income math, in pure TypeScript</text>

  <text x="96" y="430" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="32" fill="#cfe7dd">Bond pricing · yield · accrued interest · duration · portfolios</text>

  <!-- Feature pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26" fill="#0f2e26">
    <g transform="translate(96,486)">
      <rect width="300" height="56" rx="28" fill="#7fc6ad"/>
      <text x="150" y="37" text-anchor="middle">zero dependencies</text>
    </g>
    <g transform="translate(416,486)">
      <rect width="260" height="56" rx="28" fill="#7fc6ad"/>
      <text x="130" y="37" text-anchor="middle">ESM + CJS</text>
    </g>
    <g transform="translate(696,486)">
      <rect width="360" height="56" rx="28" fill="#7fc6ad"/>
      <text x="180" y="37" text-anchor="middle">Bloomberg-verified</text>
    </g>
  </g>
</svg>
