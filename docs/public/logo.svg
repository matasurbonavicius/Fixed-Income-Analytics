<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bond Analytics logo">
  <!-- Rounded tile in the site theme green -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#3c8772"/>
  <!-- A discounted cash-flow / yield curve: bars of growing present value under a curve -->
  <g fill="#ffffff">
    <rect x="14" y="38" width="6" height="12" rx="1.5"/>
    <rect x="24" y="32" width="6" height="18" rx="1.5"/>
    <rect x="34" y="26" width="6" height="24" rx="1.5"/>
    <rect x="44" y="18" width="6" height="32" rx="1.5"/>
  </g>
  <!-- Yield curve sweeping over the bars -->
  <path d="M13 44 C 24 30, 38 20, 51 14" fill="none" stroke="#d6f0e6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="51" cy="14" r="3.2" fill="#d6f0e6"/>
</svg>
