name: Release

# Publishes to npm when a GitHub Release is published.
# Requires repository secret NPM_TOKEN (an npm automation token).
# Uses OIDC provenance, which gives the verified "published from source" badge
# on the npm package page — no extra config needed beyond the permissions below.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
