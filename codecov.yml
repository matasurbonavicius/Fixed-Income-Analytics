coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "src/**/index.ts"
  - "src/**/*.types.ts"
  - "src/**/*.enums.ts"
  - "src/domain/i18n/**"
